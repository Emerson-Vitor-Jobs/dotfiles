# ==========================
# 0. CONFIGURAÇÃO DE PREFIXO
# ==========================
# Mudar prefixo de Ctrl+b para Ctrl+\
unbind C-b
set -g prefix 'C-\'
bind 'C-\' send-prefix
set -g status-right 'Continuum status: #{continuum_status}'
# ==========================
# 1. GERAL & MOUSE
# ==========================
set -g mouse on

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# ==========================
# 2. CLIPBOARD & NAVEGAÇÃO
# ==========================
set -s set-clipboard on
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set-option -g status-position top
set-option -g default-shell /usr/bin/fish
set-option -g default-command /usr/bin/fish

bind -n C-S-h send-keys Left
bind -n C-S-j send-keys Down
bind -n C-S-k send-keys Up
bind -n C-S-l send-keys Right

# ==========================
# 3. TEMA (CATPPUCCIN)
# ==========================
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# ==========================
# 4. CONFIGURAÇÃO VI MODE (IGUAL AO VIM)
# ==========================
set-window-option -g mode-keys vi

# 1. Entrar no "Normal Mode" (Copy Mode) rapidamente
# Agora você aperta Prefix + Esc para entrar no modo de navegação
bind Escape copy-mode

# 2. Configurações DENTRO do modo de cópia (copy-mode-vi)

# 'v' para começar seleção (Visual Mode)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# 'Shift + v' (V) para seleção de linha (Visual Line Mode)
bind-key -T copy-mode-vi V send-keys -X select-line

# 'Ctrl + v' para seleção em bloco (Visual Block) - Opcional, mas útil
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# 'y' para copiar (Yank) - Já integrado com seu wl-copy
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# 'i' para sair do modo de cópia (Voltar para o "Insert Mode" / Terminal)
bind-key -T copy-mode-vi i send-keys -X cancel

# 'Esc' dentro do modo de cópia limpa a seleção (igual ao Vim)
bind-key -T copy-mode-vi Escape send-keys -X clear-selection


# Navegar entre painéis como no Vim
bind h select-pane -L  # Esquerda
bind j select-pane -D  # Baixo
bind k select-pane -U  # Cima
bind l select-pane -R  # Direita

# ==========================================
# 5. UX PREMIUM (MENU CATPPUCCIN PT-BR) ☕
# ==========================================

# --- Estilo Visual (A Mágica) ---
# Fundo escuro (Mantle) e texto claro
set -g menu-style "bg=#181825 fg=#cdd6f4"

# Item selecionado: Fundo mais claro (Surface1) + Texto Azul (Blue) + Negrito
set -g menu-selected-style "bg=#313244 fg=#89b4fa bold"

# Borda do menu: Roxo suave (Mauve)
set -g menu-border-style "bg=#181825 fg=#cba6f7"

# --- O Menu Principal ---
# Acionado por: Prefixo (Ctrl+\) + Espaço
bind Space display-menu -T "#[align=center fg=#f9e2af bg=#313244 bold] 🐈 CONTROLE DE MISSÃO " -x C -y C \
    "" \
    "📐  Divisões de Tela"    "" "" \
    "    Dividir Horizontal"  "%"  "split-window -h" \
    "    Dividir Vertical"    '"'  "split-window -v" \
    "    Focar Zoom"          "z"  "resize-pane -Z" \
    "    Fechar Painel"       "x"  "kill-pane" \
    "" \
    "🪟  Janelas"             "" "" \
    "    Nova Janela"         "c"  "new-window" \
    "    Renomear Janela"     ","  "command-prompt -I '#W' { rename-window '%%' }" \
    "    Listar Todas"        "w"  "choose-tree -Z" \
    "    Anterior / Próxima"  "n"  "next-window" \
    "" \
    "⚙️   Sistema"             "" "" \
    "    Recarregar Config"   "R"  "source-file ~/.config/tmux/tmux.conf; display-message 'Config Recarregada com Sucesso! 🚀'" \
    "    Desconectar (Sair)"  "d"  "detach-client"

# --- Atalho Rápido (Duplo Ctrl+\) ---
# Acionado por: Ctrl+\ duas vezes
bind 'C-\' display-menu -T "#[align=center fg=#f9e2af bg=#313244 bold] 🐈 AÇÕES RÁPIDAS " -x C -y C \
    "" \
    "➡️   Dividir Lado a Lado"  "%"  "split-window -h" \
    "⬇️   Dividir Cima/Baixo"   '"'  "split-window -v" \
    "🔍  Zoom na Tela"         "z"  "resize-pane -Z" \
    "" \
    "✨  Nova Janela"          "c"  "new-window" \
    "🏷️   Renomear Atual"       ","  "command-prompt -I '#W' { rename-window '%%' }" \
    "❌  Fechar Painel"        "x"  "kill-pane" \
    "" \
    "🔄  Recarregar Tudo"      "R"  "source-file ~/.config/tmux/tmux.conf; display-message 'Config Recarregada!'"


bind-key w display-popup -E -w 80% -h 70% "~/.tmux/scripts/tmux_sessionizer.sh"
# ==========================
# 6. RESURRECT & CONTINUUM (FIX)
# ==========================

# FORÇAR o diretório de salvamento para não ir para pastas voláteis
# Isso garante que os arquivos fiquem na sua home persistente
set -g @resurrect-dir '~/.tmux/resurrect'

# Estratégias extras para salvar mais coisas (Vim, Pane Contents)
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# Configuração do Continuum
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'

# --- Plugins (Mantenha no final do arquivo) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'

# Inicializa o TPM
run '~/.tmux/plugins/tpm/tpm'

